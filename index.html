
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Mansu ❤️</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd1dc,#ffe8f0);
overflow:hidden;
}


/* Loading */

#loading{
position:fixed;
inset:0;
background:#ffd1dc;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#ff4d6d;
z-index:100;
animation:loading 3s forwards;
}

@keyframes loading{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}



/* Card */

.card{
background:white;
width:360px;
padding:30px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.25);
z-index:5;
animation:cardShow 1.5s;
}

@keyframes cardShow{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}



/* Photo */

.photo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:5px solid #ff4d6d;
box-shadow:0 0 25px #ffb3c6;
animation:photo 2s infinite;
}

@keyframes photo{
50%{
transform:scale(1.05);
}
}



/* Text */

h1{
color:#ff4d6d;
font-size:28px;
}


.typing{
overflow:hidden;
white-space:nowrap;
border-right:3px solid #ff4d6d;
width:0;
animation:
typing 3s steps(20) forwards,
blink .7s infinite;
}


@keyframes typing{
from{width:0;}
to{width:100%;}
}


@keyframes blink{
50%{border-color:transparent;}
}


p{
font-size:17px;
color:#555;
line-height:1.7;
}



/* Buttons */

button{
padding:13px 28px;
margin:8px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}



.music{
background:#ff85a1;
}



/* Hearts */

.heart{
position:absolute;
font-size:25px;
animation:heartMove 8s linear infinite;
}


@keyframes heartMove{

0%{
transform:translateY(100vh);
opacity:0;
}

100%{
transform:translateY(-120vh);
opacity:1;
}

}



/* Rose */

.petal{
position:absolute;
top:-30px;
font-size:25px;
animation:petalFall 10s linear infinite;
}


@keyframes petalFall{

100%{
transform:translateY(110vh) rotate(360deg);
}

}



</style>

</head>


<body>


<div id="loading">
A little surprise for you ❤️
</div>


<audio id="music" loop>
<source src="dekha.mp3" type="audio/mp3">
</audio>
<!-- Rose Petals -->

<div class="petal" style="left:10%">🌹</div>
<div class="petal" style="left:30%;animation-delay:2s">🌸</div>
<div class="petal" style="left:55%;animation-delay:4s">🌹</div>
<div class="petal" style="left:80%;animation-delay:1s">🌸</div>


<!-- Floating Hearts -->

<div class="heart" style="left:15%">❤️</div>
<div class="heart" style="left:40%;animation-delay:2s">💖</div>
<div class="heart" style="left:70%;animation-delay:4s">💕</div>



<div class="card">


<!-- Mansu Image -->

<img src="MANSU-IMAGE.jpg" class="photo">


<h1 class="typing">
Dear Mansu ❤️
</h1>


<p>
From the first day I met you, something felt different.
Your smile makes my day brighter, and thinking about you always makes me smile.
</p>


<p>
I don't know what the future holds, but I know one thing...
<br>
<b>I really like you.</b> 🌹
</p>



<button class="music" onclick="playMusic()">
🎵 Music
</button>


<button onclick="openHeart()">
💌 Open My Heart
</button>
