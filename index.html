
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial,sans-serif;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff2d55;
}

p{
    font-size:18px;
    color:#333;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff2d55;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e60039;
}
</style>
</head>

<body>

<div class="card">
<h1>Dear Crush ❤️</h1>

<p>I have something to tell you...</p>

<p><b>I really like you. Will you give me a chance? 🌹</b></p>

<button onclick="alert('Thank you for reading ❤️')">Reply</button>
</div>

</body>
</html>
