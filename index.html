<!DOCTYPE html>
<html>
<head>

<title>For Mansu ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#ffe8f0);
font-family:Arial;
overflow:hidden;
}

.card{
background:white;
width:330px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px #999;
}

.photo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:5px solid #ff4d6d;
}

h1{
color:#ff4d6d;
animation:typing 3s;
}

p{
color:#555;
font-size:17px;
line-height:1.6;
}

button{
padding:12px 25px;
margin:8px;
border:0;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
}

.heart{
position:absolute;
font-size:25px;
animation:move 8s infinite;
}

@keyframes move{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100vh);
}
}

.letter{
display:none;
}

</style>

</head>


<body>


<audio id="music" loop>
<source src="dekha.mp3" type="audio/mp3">
</audio>


<div class="heart" style="left:20%">❤️</div>
<div class="heart" style="left:70%">💖</div>


<div class="card">


<img src="MANSU-IMAGE.jpg" class="photo">


<h1>Dear Mansu ❤️</h1>


<p>
From the first day I met you, something felt different.
Your smile makes my day brighter.
</p>


<p>
I don't know what the future holds...
<br>
<b>I really like you 🌹</b>
</p>



<button onclick="music()">
🎵 Music
</button>


<button onclick="openLetter()">
💌 Open My Heart
</button>



<div class="letter" id="letter">

<p>
Dear Mansu ❤️
<br><br>
You are someone special to me.
Will you stay with me? ❤️
</p>


<button onclick="yes()">
💖 Yes
</button>


<button id="no" onmouseover="run()">
💔 No
</button>


</div>


</div>



<script>

function music(){

let m=document.getElementById("music");

m.play();

}


function openLetter(){

document.getElementById("letter").style.display="block";

}


function yes(){

alert("You made me happy ❤️");

}


function run(){

let n=document.getElementById("no");

n.style.position="absolute";
n.style.left=Math.random()*250+"px";
n.style.top=Math.random()*300+"px";

}

</script>


</body>
</html>
